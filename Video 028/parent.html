<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .parent {
        position: relative;
        border: 2px solid black;
        margin: 0px;
        padding: 0;
        height: 200px;
        width: 200px;
        background-color: #9a0000;
    }

    .child {
        position: relative;
        border: 2px solid black;
        margin: 0px;
        padding: 0;
        height: 100px;
        width: 100px;
        top: 30px;
        left: 300px;
        background-color: #674444;
        
    }
</style>

<body>
    <div class="parent"></div>
    <div class="child"></div>
</body>

</html>
