<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 3 - Design this Card</title>
</head>
<style>
    body {
        background-color: #dbdbdb;
    }



    .img {
        border: 2px solid rgb(199, 199, 199);
        border-radius: 12px;
        height: 300px;
        width: 200px;
        background-color: #fff;
        position: relative;
        left: 80px;
    }

    img {
        height: 120px;
        width: 180px;
        position: absolute;
        top: 17px;
        left: 100px;
        border-radius: 12px;
    }

    h3 {
        position: absolute;
        top: 160px;
        left: 100px;
    }

    h6 {
        position: absolute;
        top: 185px;
        left: 98px;
    }

    .nature {
        position: absolute;
        height: 21px;
        width: 75px;
        top: 150px;
        left: 100px;
        border: 1px solid rgb(170, 170, 170);
        border-radius: 12px;
    }

    .sunrise {
        position: absolute;
        height: 21px;
        width: 75px;
        top: 150px;
        left: 183px;
        border: 1px solid rgb(170, 170, 170);
        border-radius: 12px;
    }

    .nature_text {
        position: absolute;
        height: 21px;
        width: 75px;
        top: 152px;
        left: 115px;
    }

    .sunrise_text {
        position: absolute;
        height: 21px;
        width: 75px;
        top: 152px;
        left: 197px;
    }

    .blue_box {
        position: absolute;
        height: 25px;
        width: 120px;
        top: 275px;
        left: 130px;
        border: 1px solid rgb(147, 147, 255);
        background-color: rgb(147, 147, 255);
        border-radius: 12px;
    }

    .blue_text {
        color: rgb(10, 10, 194);
        position: absolute;
        top: 280px;
        left: 155px;

    }
</style>

<body>
    <div class="img"></div>
    <img src="nature.jpg" alt="Photo">
    <h3><b>Lorem, ipsum dolor.</b></h3>
    <h6>Lorem ipsum dolor sit amet consectetur <br>adipisicing elit. Sunt impedit iure <br>numquam quos illum
        nostrum?<br>Lorem ipsum dolor sit amet consectetur.</h6>

    <div class="nature"></div>
    <div class="sunrise"></div>
    <div class="nature_text">Nature</div>
    <div class="sunrise_text">Sunrise</div>
    <div class="blue_box"></div>
    <div class="blue_text">Read More</div>
</body>

</html>
